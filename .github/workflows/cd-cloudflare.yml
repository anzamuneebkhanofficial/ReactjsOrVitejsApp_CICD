name: CD — Cloudflare Pages

on:
  workflow_call:

jobs:
  deploy:
    name: 🚀 Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    # No env: block needed — both workaround vars are removed

    steps:
      - name: Checkout code
        uses: actions/checkout@v5          # ✅ Node 24 native (was @v4)

      - name: Download build artifact from CI
        uses: actions/download-artifact@v4  # kept — same API; runs on Node 24 by default now
        with:
          name: vite-dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.run_id }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4  # ✅ Node 24 native + Wrangler v4 (was @v3)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=reactjsorvitejsapp-cicd --branch=main --commit-dirty=true