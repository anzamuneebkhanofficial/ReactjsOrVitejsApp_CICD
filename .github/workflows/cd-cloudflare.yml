name: CD — Cloudflare Pages

on:
  workflow_call:

jobs:
  deploy:
    name: 🚀 Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.run_id }}
          # We use github.run_id here because this workflow was called directly by the CI


      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=reactjsorvitejsapp-cicd --branch=main --commit-dirty=true