name: CI — Vite React
# Runs on every push to main/dev and every PR targeting main.
# Jobs run in a STRICT CHAIN: quality → build
# If any job fails, all downstream jobs are SKIPPED automatically.

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'          # Ignore README and other markdown files
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

# ──────────────────────────────────────────────────────────
# CONCURRENCY: If a new push arrives while this workflow is
# already running for the same branch, CANCEL the old run
# and start fresh with the latest code.
# ──────────────────────────────────────────────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — QUALITY
  # Lint and security audit. Fails fast before wasting time.
  # ──────────────────────────────────────────────────────────
  quality:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        # Industry standard: strict, reproducible install from package-lock.json.
        # Works correctly because package-lock.json was regenerated with
        # --include=optional, so all platform-specific peer deps are included.

      - name: ESLint
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high
        # Only fails for HIGH or CRITICAL severity CVEs


  # ──────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # Runs ONLY after quality passes. Verifies production build.
  # Uploads /dist artifact for the CD job to reuse.
  # ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Vite Build
    runs-on: ubuntu-latest
    needs: quality
    # ↑ CHAIN: will NOT start until "quality" succeeds.
    # quality fails → build is SKIPPED → CD never runs.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Vite build files
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'vite.config.js') }}
          restore-keys: ${{ runner.os }}-vite-

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist/
          retention-days: 1