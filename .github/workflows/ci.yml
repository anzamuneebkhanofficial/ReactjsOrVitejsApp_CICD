name: CI — Vite React
# Label shown in GitHub Actions tab

on:
  push:
    branches: [main, dev]
    # Run when code is pushed to main OR dev branch
  pull_request:
    branches: [main]
    # Run when a PR is opened targeting main
    # GitHub will block the merge until this passes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  # Push twice quickly → cancel first run → start fresh
  # (See Chapter 0.4 for full explanation)

permissions:
  contents: read
  # This workflow can only read code. Cannot write or push.

jobs:

  # ─────────────────────────────────────────────────────
  # JOB 1: QUALITY
  # Check code is correct before wasting time on tests
  # ─────────────────────────────────────────────────────
  quality:
    name: 🔍 Lint · Format · Types · Security
    runs-on: ubuntu-latest
    # Fresh Ubuntu VM. See Chapter 0.4 for explanation.

    steps:
      - uses: actions/checkout@v4
        # Get code onto machine. Always first. (Ch 0.4)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        # Install Node.js 22 AND automatically cache npm dependencies.

      - name: Install packages
        run: npm ci
        # "Clean Install" - strict installation from package-lock.json.
        # Faster and safer for CI environments than "npm install".

      - name: ESLint
        run: npm run lint
        # Runs your package.json "lint" script
        # What it catches:
        #   ✗ const x = 5; (declared but never used)
        #   ✗ useEffect(() => { fetchData() }, [fetchData])
        # Industry standard: zero tolerance for lint issues

      - name: Prettier
        run: npm run format:check
        # Runs your package.json "format:check" script
        # Checks ALL files: .ts, .tsx, .json, .css, .md
        # Does NOT change anything — only checks
        # Fix locally: run "npm run format" then commit

      - name: TypeScript
        run: npm run type-check
        # Runs your package.json "type-check" script (tsc --noEmit)
        # Faster than full build. Just checking, not building.

      - name: Security Audit
        run: npm audit --audit-level=high
        # Checks ALL your packages against the CVE database
        # CVE = Common Vulnerabilities and Exposures
        # --audit-level=high = only FAIL for HIGH or CRITICAL


  # ─────────────────────────────────────────────────────
  # JOB 2: TEST
  # Run only if quality passed
  # ─────────────────────────────────────────────────────
  test:
    name: 🧪 Vitest
    runs-on: ubuntu-latest
    needs: quality
    # needs: quality = wait for quality job to finish
    # If quality FAILS → this job is SKIPPED entirely

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # (All above = standard boilerplate.)

      - name: Run tests
        run: npm run test:coverage
        # Runs your package.json "test:coverage" script
        # If any test assertion fails → step FAILS → no deploy
        env:
          NODE_ENV: test
          # Tell your app: "you are running in test mode"

      - name: Save coverage report
        uses: actions/upload-artifact@v4
        if: always()
        # if: always() = upload EVEN if tests failed
        # So you can see the report to understand what broke
        with:
          name: coverage-report
          path: coverage/
          # Vitest outputs coverage to /coverage folder
          retention-days: 7


  # ─────────────────────────────────────────────────────
  # JOB 3: BUILD
  # Run only if tests passed
  # ─────────────────────────────────────────────────────
  build:
    name: 🏗️ Vite Build
    runs-on: ubuntu-latest
    needs: test
    # Chain: quality → test → build
    # All three must pass in order

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Vite intermediate build
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          # Vite stores intermediate build cache in node_modules/.vite
          # If your source files haven't changed → Vite reuses this
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'vite.config.ts') }}
          # Key changes when any src file OR vite config changes
          restore-keys: ${{ runner.os }}-vite-

      - run: npm ci

      - name: Build
        run: npm run build
        # Runs your package.json "build" script
        # Result: /dist folder = your complete app ready to deploy
        env:
          NODE_ENV: production
          # Production mode = all optimizations enabled

      - name: Save build output
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist/
          # Save the /dist folder
          # CD jobs download this instead of rebuilding
          retention-days: 1