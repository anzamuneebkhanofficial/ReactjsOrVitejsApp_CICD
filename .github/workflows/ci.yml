name: CI — Vite React
# Runs on every push to main/dev and every PR targeting main.
# Jobs run in a STRICT CHAIN: quality → build
# If any job fails, all downstream jobs are SKIPPED automatically.

on:
  push:
    branches: [main, dev]
    # Trigger on pushes to main OR dev branch
  pull_request:
    branches: [main]
    # Block merges to main until this workflow passes

# ──────────────────────────────────────────────────────────
# CONCURRENCY: If a new push arrives while this workflow is
# already running for the same branch, CANCEL the old run
# and start fresh with the latest code.
# ──────────────────────────────────────────────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Read-only: this workflow never writes back to the repo

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — QUALITY
  # Lint the code. Fast check — catches mistakes before build.
  # ──────────────────────────────────────────────────────────
  quality:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repo onto the runner machine

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        # Installs Node 22 + caches node_modules between runs

      - name: Install dependencies
        run: npm install --prefer-offline
        # npm install (not npm ci) is used here because this project uses
        # packages with optional native binaries (e.g. @napi-rs/wasm-runtime)
        # whose peer deps differ between Windows (dev) and Linux (CI).
        # npm install resolves this gracefully; npm ci would fail.
        # --prefer-offline = use local cache first, minimise network calls.

      - name: ESLint
        run: npm run lint
        # Checks for code quality issues (unused vars, bad hooks, etc.)
        # Zero tolerance — any lint error fails this job

      - name: Security Audit
        run: npm audit --audit-level=high
        # Scans all packages against the CVE vulnerability database
        # Only fails for HIGH or CRITICAL severity issues


  # ──────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # Runs ONLY if quality passed. Verifies the app compiles
  # cleanly for production. Saves the /dist as an artifact
  # so the CD job can download it instead of rebuilding.
  # ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Vite Build
    runs-on: ubuntu-latest
    needs: quality
    # ↑ CHAIN: this job will NOT start until "quality" succeeds.
    # If quality fails → build is SKIPPED → CD never runs.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Vite intermediate build files
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'vite.config.js') }}
          # Cache key changes when any src file or vite config changes
          restore-keys: ${{ runner.os }}-vite-

      - name: Install dependencies
        run: npm install --prefer-offline
        # Consistent with the quality job above

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
          # Enables all production optimisations in Vite

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist/
          # CD job downloads this — no need to rebuild twice
          retention-days: 1